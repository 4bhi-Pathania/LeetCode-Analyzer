<!DOCTYPE html>
<html>
<head>
  <title>DSA Analyzer</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>

  <div class="container">
    <h1>LeetCode Analyzer</h1>

    <div class="inputs">
  <input id="user1" placeholder="User 1">
  <input id="user2" placeholder="User 2">
  <button onclick="compareUsers()">Compare</button>
</div>
<div class="cards">
  <div class="card">
    <h3>Total</h3>
    <p id="total"></p>
  </div>
  <div class="card">
    <h3>Easy</h3>
    <p id="easy"></p>
  </div>
  <div class="card">
    <h3>Medium</h3>
    <p id="medium"></p>
  </div>
  <div class="card">
    <h3>Hard</h3>
    <p id="hard"></p>
  </div>
</div>
    <h2 id="stats"></h2>
  <div class="chart-container">
  <canvas id="chart"></canvas>
</div>

  <script src="script.js"></script>
</body>
</html>
